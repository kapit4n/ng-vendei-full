<div class="payment-panel">
  <section class="payment-sidebar" aria-label="Customer and payment log">
    <div class="payment-chips" *ngIf="payedItems.length > 0">
      <span class="payment-chips-label" i18n>Pagos</span>
      <button type="button" class="chip-thumb" *ngFor="let payI of payedItems" (click)="removeItem(payI)"
        [attr.aria-label]="'Quitar pago'"
        [class.chip-thumb--qr]="isQrPayment(payI)">
        <mat-icon *ngIf="isQrPayment(payI)" class="chip-qr-icon">qr_code_2</mat-icon>
        <span class="chip-qr-amount" *ngIf="isQrPayment(payI)">{{ payI.name }} Bs</span>
        <img *ngIf="!isQrPayment(payI) && payI.img" [src]="payI.img" height="28" width="40" alt="" />
      </button>
    </div>

    <div class="payment-chips" *ngIf="returnItems.length > 0">
      <span class="payment-chips-label" i18n>Return</span>
      <button type="button" class="chip-thumb" *ngFor="let payI of returnItems" (click)="removeItem(payI)">
        <img [src]="payI.img" height="28" width="40" alt="" />
      </button>
    </div>

    <div class="discount-line" *ngIf="discountItems.length > 0">
      <span class="payment-chips-label">Discount</span>
      <span class="discount-tags">
        <button type="button" class="discount-tag" *ngFor="let payI of discountItems" (click)="removeItem(payI)">
          {{ payI.name }}
        </button>
      </span>
    </div>

    <div class="customer-card">
      <div class="customer-card-label">Customer</div>
      <div class="customer-card-name">{{ selectedCustomer?.name || '—' }}</div>
      <div class="customer-card-ci">CI: {{ selectedCustomer?.ci ?? '—' }}</div>
      <button mat-stroked-button color="primary" class="customer-select-btn" (click)="openDialog()"
        [disabled]="printOrderCount">
        <mat-icon>person</mat-icon>
        Select customer
      </button>
    </div>
  </section>

  <section class="payment-keypad" [attr.aria-label]="payTypeLabel">
    <div class="due-banner" *ngIf="orderTotal > 0">
      <div class="due-banner-row">
        <span class="due-label">Total ticket</span>
        <span class="due-amount">Bs {{ orderTotal | number:'1.2-2' }}</span>
      </div>
      <div class="due-banner-row due-banner-row--accent" *ngIf="amountDue > 0">
        <span class="due-label">Pendiente</span>
        <span class="due-amount">Bs {{ amountDue | number:'1.2-2' }}</span>
      </div>
      <div class="due-banner-row due-banner-row--ok" *ngIf="orderTotal > 0 && amountDue <= 0">
        <mat-icon class="due-ok-icon">check_circle</mat-icon>
        <span>Cobro cubierto — puede guardar o entregar cambio si aplica</span>
      </div>
    </div>

    <div class="mode-tabs" role="tablist" aria-label="Tipo de movimiento">
      <button type="button" role="tab" class="mode-tab" [class.mode-tab--active]="payType === PayKind.PAYMONEY"
        [attr.aria-selected]="payType === PayKind.PAYMONEY" (click)="payMoney()" [disabled]="printOrderCount">
        <mat-icon>payments</mat-icon>
        Efectivo
      </button>
      <button type="button" role="tab" class="mode-tab" [class.mode-tab--active]="payType === PayKind.PAYQR"
        [attr.aria-selected]="payType === PayKind.PAYQR" (click)="payWithQr()" [disabled]="printOrderCount">
        <mat-icon>qr_code_2</mat-icon>
        QR
      </button>
      <button type="button" role="tab" class="mode-tab" [class.mode-tab--active]="payType === PayKind.PAYRETURN"
        [attr.aria-selected]="payType === PayKind.PAYRETURN" (click)="returnMoney()" [disabled]="printOrderCount">
        <mat-icon>undo</mat-icon>
        Cambio
      </button>
      <button type="button" role="tab" class="mode-tab" [class.mode-tab--active]="payType === PayKind.DISCOUNT"
        [attr.aria-selected]="payType === PayKind.DISCOUNT" (click)="discount()" [disabled]="printOrderCount">
        <mat-icon>percent</mat-icon>
        Desc.
      </button>
    </div>

    <div class="keypad-header">
      <span class="keypad-hint">{{ keypadHint }}</span>
    </div>

    <div class="bill-grid" [class.bill-grid--qr]="payType === PayKind.PAYQR">
      <button type="button" mat-stroked-button class="bill-btn" *ngFor="let payItem of payItems"
        (click)="payIt(payItem, payType)" [disabled]="printOrderCount">
        <mat-icon class="bill-qr-badge" *ngIf="payType === PayKind.PAYQR">qr_code_2</mat-icon>
        <img *ngIf="payItem.img" [src]="payItem.img" class="bill-img" alt="" />
        <span class="bill-label">{{ payItem.name }}<span *ngIf="displayCurrentType" class="bill-currency">{{ currentType }}</span></span>
      </button>
    </div>
  </section>
</div>
