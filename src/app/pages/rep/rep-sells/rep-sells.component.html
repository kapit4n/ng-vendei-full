<div class="container">
  <button class="btn" (click)="openProducts()"><i class="fa fa-info fa-lg"></i></button>
  <button class="btn" (click)="openCart()"><i class="fa fa-shopping-cart fa-lg"></i></button>
  <table class="table">
    <tr>
      <th>Product</th>
      <th>Quantity</th>
      <th>Price</th>
      <th>Total Price</th>
      <th>Date</th>
      <th></th>
    </tr>
    @for (sell of sells; track sell) {
      <tr>
        <td>{{sell.product.name}}</td>
        <td>{{sell.quantity}}</td>
        <td>{{sell.price}}</td>
        <td>{{sell.totalPrice}}</td>
        <td>{{sell.createdDate | date:'medium'}}</td>
        <td>
          @if (false) {
            <button class="btn" (click)="openSellRep(sell.id)"><i class="fa fa-folder"></i></button>
            } &nbsp;
          </td>
        </tr>
      }
    </table>
  </div>
