<div class="main-hub">
  <header class="main-hub__hero">
    <div class="main-hub__hero-inner">
      <h1 class="main-hub__title">Vendei</h1>
      <p class="main-hub__tagline">Choose a module to open the workspace.</p>
    </div>
  </header>

  <div class="main-hub__body">
    @for (section of hubSections; track section.id) {
      <section class="hub-section" [attr.aria-labelledby]="'hub-section-' + section.id">
        <div class="hub-section__head">
          <span class="hub-section__icon-wrap" aria-hidden="true">
            <mat-icon class="hub-section__icon">{{ section.matIcon }}</mat-icon>
          </span>
          <div class="hub-section__titles">
            <h2 class="hub-section__label" [id]="'hub-section-' + section.id">{{ section.label }}</h2>
            <p class="hub-section__subtitle">{{ section.subtitle }}</p>
          </div>
        </div>

        <div class="hub-grid">
          @for (tile of section.tiles; track tile.path) {
            <a class="hub-tile" [routerLink]="tile.path">
              <mat-card class="hub-tile__card" appearance="outlined">
                <mat-card-content class="hub-tile__content">
                  <div class="hub-tile__icon-ring" aria-hidden="true">
                    <mat-icon>{{ tile.matIcon }}</mat-icon>
                  </div>
                  <h3 class="hub-tile__title">{{ tile.title }}</h3>
                  <p class="hub-tile__desc">{{ tile.description }}</p>
                  <span class="hub-tile__cta">
                    Open
                    <mat-icon class="hub-tile__chevron">chevron_right</mat-icon>
                  </span>
                </mat-card-content>
              </mat-card>
            </a>
          }
        </div>
      </section>
    }
  </div>
</div>
