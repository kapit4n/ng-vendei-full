<div class="reg-product-page">
  <mat-card class="reg-product-card">
    <mat-card-header>
      <mat-card-title>{{ pageTitle }}</mat-card-title>
      <mat-card-subtitle>{{ pageSubtitle }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <p class="form-error" *ngIf="saveError" role="alert">{{ saveError }}</p>

      <div class="form-layout">
        <div class="preview-panel">
          <div class="preview-frame" [class.preview-frame--empty]="!imagePreviewUrl">
            <img [src]="imagePreviewUrl" alt="Product preview" class="preview-img" />
          </div>
          <p class="preview-hint">Image URL updates this preview.</p>
        </div>

        <div class="fields-panel">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Category</mat-label>
            <mat-select [(ngModel)]="productInfo.categoryId" name="categoryId" required
              [compareWith]="compareCategoryId">
              <mat-option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</mat-option>
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Product name</mat-label>
            <input matInput type="text" [(ngModel)]="productInfo.name" name="name" required autocomplete="off" />
          </mat-form-field>

          <div class="field-row">
            <mat-form-field appearance="outline" class="flex-1">
              <mat-label>Code</mat-label>
              <input matInput type="text" [(ngModel)]="productInfo.code" name="code" required autocomplete="off" />
            </mat-form-field>
          </div>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Image URL</mat-label>
            <input matInput type="url" [(ngModel)]="productInfo.img" name="img" autocomplete="off"
              placeholder="https://… or assets/…" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Description</mat-label>
            <textarea matInput rows="4" [(ngModel)]="productInfo.description" name="description"></textarea>
          </mat-form-field>
        </div>
      </div>
    </mat-card-content>

    <mat-card-actions align="end" class="card-actions">
      <button mat-stroked-button type="button" (click)="cancel()">Cancel</button>
      <button mat-raised-button color="primary" type="button" (click)="save()">Save</button>
    </mat-card-actions>
  </mat-card>
</div>
