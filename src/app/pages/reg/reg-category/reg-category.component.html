<div class="reg-category-page">
  <mat-card class="reg-category-card">
    <mat-card-header>
      <mat-card-title>{{ pageTitle }}</mat-card-title>
      <mat-card-subtitle>Code should be short and unique (e.g. GROCERY, ELEC).</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      @if (loadError) {
        <p class="form-error" role="alert">{{ loadError }}</p>
      }
      @if (saveError) {
        <p class="form-error" role="alert">{{ saveError }}</p>
      }

      <div class="form-layout">
        <div class="preview-panel">
          <div class="preview-frame" [class.preview-frame--empty]="!((categoryInfo.img || '').trim())">
            <img [src]="imagePreviewUrl" alt="Category image preview" class="preview-img" />
          </div>
          <p class="preview-hint">Set image URL below, or leave empty for placeholder.</p>
        </div>

        <div class="fields-panel">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Name</mat-label>
            <input matInput [(ngModel)]="categoryInfo.name" name="name" required autocomplete="off" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Code</mat-label>
            <input matInput [(ngModel)]="categoryInfo.code" name="code" required autocomplete="off" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Description</mat-label>
            <textarea matInput rows="3" [(ngModel)]="categoryInfo.description" name="description"></textarea>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Image URL</mat-label>
            <input
              matInput
              type="url"
              [(ngModel)]="categoryInfo.img"
              name="img"
              autocomplete="off"
              placeholder="https://… or assets/…" />
          </mat-form-field>
        </div>
      </div>
    </mat-card-content>

    <mat-card-actions align="end" class="card-actions">
      <button mat-stroked-button type="button" (click)="cancel()">Cancel</button>
      <button mat-raised-button color="primary" type="button" (click)="save()">Save</button>
    </mat-card-actions>
  </mat-card>
</div>
