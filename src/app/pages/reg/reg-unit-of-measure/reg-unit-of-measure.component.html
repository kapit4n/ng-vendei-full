<div class="uom-form-page">
  <mat-card class="uom-card">
    <mat-card-header>
      <mat-card-title>{{ isNew ? 'New unit of measure' : 'Edit unit of measure' }}</mat-card-title>
      <mat-card-subtitle>Short code for APIs and a readable name for lists and receipts.</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      @if (saveError) {
        <p class="form-error" role="alert">{{ saveError }}</p>
      }
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Code</mat-label>
        <input matInput [(ngModel)]="info.code" name="code" required autocomplete="off" placeholder="e.g. KG, BOX" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Name</mat-label>
        <input matInput [(ngModel)]="info.name" name="name" required autocomplete="off" placeholder="e.g. Kilogram" />
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions align="end">
      <button mat-stroked-button type="button" (click)="cancel()">Cancel</button>
      <button mat-raised-button color="primary" type="button" (click)="save()">Save</button>
    </mat-card-actions>
  </mat-card>
</div>
