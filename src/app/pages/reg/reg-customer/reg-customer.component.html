<div class="customer-form-page">
  <mat-card class="customer-card">
    <mat-card-header>
      <mat-card-title>{{ pageTitle }}</mat-card-title>
      <mat-card-subtitle>Use a unique code (e.g. CUST-001) for imports and APIs.</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      @if (loadError) {
        <p class="form-error" role="alert">{{ loadError }}</p>
      }
      @if (saveError) {
        <p class="form-error" role="alert">{{ saveError }}</p>
      }

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Name</mat-label>
        <input matInput [(ngModel)]="customerInfo.name" name="name" required autocomplete="off" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Code</mat-label>
        <input matInput [(ngModel)]="customerInfo.code" name="code" required autocomplete="off" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Address</mat-label>
        <textarea matInput rows="3" [(ngModel)]="customerInfo.address" name="address"></textarea>
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions align="end">
      <button mat-stroked-button type="button" (click)="cancel()">Cancel</button>
      <button mat-raised-button color="primary" type="button" (click)="save()">Save</button>
    </mat-card-actions>
  </mat-card>
</div>
